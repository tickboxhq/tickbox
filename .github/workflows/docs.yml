name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# One docs build at a time per branch; cancel in-flight on a new push.
concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build and push docs image to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: tag
        env:
          SHA: ${{ github.sha }}
        run: |
          short_sha=$(printf '%s' "$SHA" | cut -c1-7)
          ts=$(date -u +%s)
          tag="main-${short_sha}-${ts}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docs/Dockerfile
          push: true
          tags: |
            ghcr.io/tickboxhq/docs:${{ steps.tag.outputs.tag }}
            ghcr.io/tickboxhq/docs:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/tickboxhq/tickbox
            org.opencontainers.image.description=Tickbox docs (Astro Starlight, served by nginx)
            org.opencontainers.image.licenses=MIT
