name: WWW

on:
  push:
    branches: [main]
    paths:
      - 'www/**'
      - 'packages/core/**'
      - 'packages/banner-default/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/www.yml'
  workflow_dispatch:

concurrency:
  group: www-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build and push www image to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GitHub context goes through env vars rather than inline expansion in
      # the shell, so a malicious value can't change the script's meaning.
      - name: Compute image tag
        id: tag
        env:
          SHA: ${{ github.sha }}
        run: |
          short_sha=$(printf '%s' "$SHA" | cut -c1-7)
          ts=$(date -u +%s)
          tag="main-${short_sha}-${ts}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: www/Dockerfile
          push: true
          tags: |
            ghcr.io/tickboxhq/www:${{ steps.tag.outputs.tag }}
            ghcr.io/tickboxhq/www:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/tickboxhq/tickbox
            org.opencontainers.image.description=Tickbox marketing site (Astro, served by nginx)
            org.opencontainers.image.licenses=MIT
