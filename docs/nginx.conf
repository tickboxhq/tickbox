# nginx config for the Tickbox docs site. Pure static delivery — no upstream,
# no proxying. Listens on 8080 so we can run as a non-root user inside the
# container.

worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Use /tmp for any temp files since the runtime user is non-root.
  client_body_temp_path /tmp/client_body;
  proxy_temp_path /tmp/proxy;
  fastcgi_temp_path /tmp/fastcgi;
  uwsgi_temp_path /tmp/uwsgi;
  scgi_temp_path /tmp/scgi;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  server_tokens off;

  # gzip everything we serve. Brotli would be nicer but isn't in nginx:alpine
  # by default and isn't worth a custom image.
  gzip on;
  gzip_vary on;
  gzip_min_length 256;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/json
    application/xml
    application/xml+rss
    application/atom+xml
    application/rss+xml
    image/svg+xml
    font/woff
    font/woff2;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
  access_log /dev/stdout main;

  server {
    listen 8080 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hashed Astro assets — long cache, immutable.
    location ~* ^/_astro/ {
      expires 1y;
      add_header Cache-Control "public, max-age=31536000, immutable";
      try_files $uri =404;
    }

    # Other static assets — modest cache.
    location ~* \.(svg|png|jpg|jpeg|gif|ico|webp|woff|woff2|ttf|otf)$ {
      expires 7d;
      add_header Cache-Control "public, max-age=604800";
      try_files $uri =404;
    }

    # Astro emits HTML files at directory paths (e.g. /concepts/modes/index.html).
    # try_files handles trailing-slash and exact matches; fall back to 404.html
    # if Starlight has one, otherwise nginx's default 404.
    location / {
      add_header Cache-Control "public, max-age=300, must-revalidate";
      try_files $uri $uri/ $uri/index.html /404.html =404;
    }

    # Health check for Kubernetes liveness/readiness probes. Lightweight,
    # always 200, never logged.
    location = /healthz {
      access_log off;
      add_header Content-Type text/plain;
      return 200 'ok';
    }
  }
}
